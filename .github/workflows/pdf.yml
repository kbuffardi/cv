name: Publish CV as PDF

on:
  push:
    branches: [main]
    paths:
      - "main.tex"
      - "papers.bib"
      - "**/*.tex"
      - "**/*.bib"
      - ".github/workflows/pdf.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Pages
        uses: actions/configure-pages@v5

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex

      - name: Rename PDF
        run: mv main.pdf buffardi-curriculum-vitae.pdf

      - name: Prepare Pages site
        run: |
          mkdir -p _site
          cp buffardi-curriculum-vitae.pdf _site/
          cat > _site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>Buffardi Curriculum Vitae</title>
            </head>
            <body>
              <p>
                <a href="buffardi-curriculum-vitae.pdf">Download the PDF</a>
              </p>
              <embed
                src="buffardi-curriculum-vitae.pdf"
                type="application/pdf"
                width="100%"
                height="1000px"
              />
            </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Set release metadata
        id: meta
        run: |
          DATE="$(date -u +'%d-%m-%Y')"
          TAG="${DATE}"
          NAME="${DATE}"
          echo "release_tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "release_name=${NAME}" >> "${GITHUB_OUTPUT}"

      - name: Create release and attach PDF
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.meta.outputs.release_tag }}" \
            buffardi-curriculum-vitae.pdf \
            --title "${{ steps.meta.outputs.release_name }}" \
            --notes "Automated CV build for ${GITHUB_SHA}"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
